<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRM WhatsApp</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

:root {
  --bg-primary: #0f172a;
  --bg-secondary: #1e293b;
  --bg-tertiary: #334155;
  --bg-card: rgba(30, 41, 59, 0.8);
  --text-primary: #f1f5f9;
  --text-secondary: #94a3b8;
  --text-muted: #64748b;
  --border: #334155;
  --border-light: rgba(148, 163, 184, 0.15);
  --accent: #6366f1;
  --accent-hover: #818cf8;
  --danger: #ef4444;
  --danger-hover: #dc2626;
  --success: #22c55e;
  --whatsapp: #25D366;
  --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.3);
  --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.4);
  --radius-sm: 6px;
  --radius-md: 10px;
  --radius-lg: 16px;
  --transition: 0.2s ease;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html, body, #root { height: 100%; width: 100%; overflow: hidden; }

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
}

.app-layout { display: flex; height: 100vh; width: 100vw; overflow: hidden; }

.sidebar {
  width: 240px; min-width: 240px;
  background: var(--bg-secondary);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
}

.sidebar-logo {
  display: flex; align-items: center; gap: 10px;
  padding: 20px 20px 16px;
  border-bottom: 1px solid var(--border);
}

.logo-icon {
  width: 38px; height: 38px;
  background: linear-gradient(135deg, #25D366, #128C7E);
  border-radius: var(--radius-sm);
  display: flex; align-items: center; justify-content: center; color: white;
  font-size: 20px;
}

.logo-text {
  font-size: 20px; font-weight: 700; letter-spacing: -0.5px;
  color: #25D366;
}

.logo-tag {
  font-size: 10px; font-weight: 600; color: var(--accent);
  background: rgba(99, 102, 241, 0.15);
  padding: 2px 6px; border-radius: 4px;
  text-transform: uppercase; letter-spacing: 0.5px;
}

.sidebar-nav { flex: 1; padding: 16px 12px; display: flex; flex-direction: column; gap: 4px; }

.nav-item {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 14px; border: none; background: none;
  color: var(--text-secondary); font-size: 14px; font-weight: 500;
  cursor: pointer; border-radius: var(--radius-sm);
  transition: all var(--transition); width: 100%; text-align: left;
}

.nav-item:hover { background: rgba(148, 163, 184, 0.08); color: var(--text-primary); }
.nav-item.active { background: rgba(37, 211, 102, 0.12); color: #25D366; }

.sidebar-actions {
  padding: 16px 12px; border-top: 1px solid var(--border);
  display: flex; flex-direction: column; gap: 8px;
}

.action-btn {
  display: flex; align-items: center; justify-content: center; gap: 8px;
  padding: 10px 14px; border: none; border-radius: var(--radius-sm);
  font-size: 13px; font-weight: 600; cursor: pointer;
  transition: all var(--transition); font-family: inherit; text-decoration: none;
}

.action-btn.primary { background: linear-gradient(135deg, #25D366, #128C7E); color: white; }
.action-btn.primary:hover { background: linear-gradient(135deg, #1ea852, #0d6e5e); transform: translateY(-1px); }

.action-btn.secondary { background: rgba(148, 163, 184, 0.1); color: var(--text-secondary); border: 1px solid var(--border); }
.action-btn.secondary:hover { background: rgba(148, 163, 184, 0.15); color: var(--text-primary); }

.action-btn.whatsapp { background: #25D366; color: white; }
.action-btn.whatsapp:hover { background: #1ea852; }

.main-content { flex: 1; overflow: hidden; background: var(--bg-primary); display: flex; flex-direction: column; }

.pipeline-view { display: flex; flex-direction: column; height: 100%; }

.pipeline-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 20px 24px 16px; gap: 20px;
}

.pipeline-title { font-size: 22px; font-weight: 700; letter-spacing: -0.3px; white-space: nowrap; }

.pipeline-filters { display: flex; align-items: center; gap: 12px; flex: 1; justify-content: flex-end; }

.search-bar { position: relative; max-width: 360px; flex: 1; }

.search-input {
  width: 100%; padding: 8px 14px 8px 40px;
  background: var(--bg-secondary); border: 1px solid var(--border);
  border-radius: var(--radius-md); color: var(--text-primary);
  font-size: 13px; font-family: inherit; outline: none;
}

.search-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15); }
.search-input::placeholder { color: var(--text-muted); }

.pipeline-board {
  display: flex; gap: 12px; padding: 0 24px 24px;
  flex: 1; overflow-x: auto; overflow-y: hidden;
}

.pipeline-column {
  min-width: 260px; width: 260px;
  display: flex; flex-direction: column;
  background: rgba(30, 41, 59, 0.4);
  border-radius: var(--radius-md); border: 1px solid var(--border-light);
}

.pipeline-column-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 14px;
  border-top-left-radius: var(--radius-md); border-top-right-radius: var(--radius-md);
}

.column-header-left { display: flex; align-items: center; gap: 8px; }

.column-title { font-size: 13px; font-weight: 600; color: var(--text-primary); }

.column-count {
  font-size: 12px; font-weight: 700;
  padding: 2px 8px; border-radius: 12px; min-width: 24px; text-align: center;
}

.pipeline-column-body {
  flex: 1; padding: 8px; display: flex; flex-direction: column;
  gap: 8px; overflow-y: auto; min-height: 100px;
  border-radius: 0 0 var(--radius-md) var(--radius-md);
}

.column-empty {
  display: flex; align-items: center; justify-content: center;
  padding: 24px; color: var(--text-muted); font-size: 12px;
  font-style: italic; opacity: 0.6;
}

.lead-card {
  background: var(--bg-secondary); border-radius: var(--radius-sm);
  padding: 10px; cursor: grab; border: 1px solid var(--border-light);
  box-shadow: var(--shadow-sm);
  transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
  display: flex; flex-direction: column; gap: 8px; position: relative;
}

.lead-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); border-color: var(--border); }
.lead-card:active { cursor: grabbing; }

.column-new { border-left: 3px solid #6366f1; }
.column-contacted { border-left: 3px solid #fbbf24; }
.column-replied { border-left: 3px solid #22c55e; }

.lead-card.new { border-left: 3px solid #6366f1; }
.lead-card.contacted { border-left: 3px solid #fbbf24; }
.lead-card.replied { border-left: 3px solid #22c55e; }

.lead-card-status.new { background: rgba(99, 102, 241, 0.15); color: #6366f1; }
.lead-card-status.contacted { background: rgba(251, 191, 36, 0.15); color: #fbbf24; }
.lead-card-status.replied { background: rgba(34, 197, 94, 0.15); color: #22c55e; }

.stat-value.new { color: #6366f1; }
.stat-value.contacted { color: #fbbf24; }
.stat-value.replied { color: #22c55e; }

.lead-card-header { display: flex; align-items: flex-start; gap: 8px; }

.lead-card-name { font-size: 13px; font-weight: 500; color: var(--text-primary); flex: 1; line-height: 1.4; }

.lead-card-delete {
  background: transparent; border: none; color: var(--text-muted);
  padding: 4px; border-radius: 4px; cursor: pointer;
  opacity: 0; transition: all 0.2s ease;
}

.lead-card:hover .lead-card-delete { opacity: 0.6; }
.lead-card-delete:hover { opacity: 1 !important; color: var(--danger); background: rgba(239, 68, 68, 0.1); }

.lead-card-info { display: flex; flex-direction: column; gap: 4px; }

.lead-card-detail {
  display: flex; align-items: center; gap: 6px;
  font-size: 11px; color: var(--text-muted);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

.lead-card-status {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 3px 8px; border-radius: 12px;
  font-size: 10px; font-weight: 500;
}

.lead-card-status.sent { background: rgba(34, 197, 94, 0.15); color: var(--success); }
.lead-card-status.pending { background: rgba(251, 191, 36, 0.15); color: #fbbf24; }

.lead-card-whatsapp {
  display: flex; align-items: center; justify-content: center; gap: 4px;
  padding: 6px 10px; background: #25D366; color: white;
  border: none; border-radius: var(--radius-sm);
  font-size: 11px; font-weight: 500; cursor: pointer;
  transition: all var(--transition);
  text-decoration: none; margin-top: 6px;
}

.lead-card-whatsapp:hover { background: #1ea852; }

.lead-card-actions {
  display: flex; gap: 6px; margin-top: 6px; padding-top: 6px;
  border-top: 1px solid var(--border-light);
}

.lead-card-actions button {
  flex: 1; padding: 6px; border: none; border-radius: var(--radius-sm);
  cursor: pointer; font-size: 11px; font-weight: 500;
  transition: all var(--transition); background: var(--bg-tertiary); color: var(--text-secondary);
}

.lead-card-actions button:hover { background: var(--accent); color: white; }
.lead-card-actions button.sent-btn { background: rgba(34, 197, 94, 0.15); color: var(--success); }
.lead-card-actions button.sent-btn:hover { background: var(--danger); color: white; }

/* Stats */
.stats-bar { display: flex; gap: 12px; padding: 12px 24px; border-bottom: 1px solid var(--border); background: var(--bg-secondary); }

.stat-item { display: flex; align-items: center; gap: 8px; padding: 8px 14px; background: var(--bg-tertiary); border-radius: var(--radius-sm); }

.stat-value { font-size: 16px; font-weight: 700; }
.stat-value.sent { color: var(--success); }
.stat-value.pending { color: #fbbf24; }
.stat-value.total { color: var(--accent); }
.stat-label { font-size: 12px; color: var(--text-secondary); }

/* Modal */
.modal-overlay {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0, 0, 0, 0.7);
  display: flex; align-items: center; justify-content: center; z-index: 1000;
}

.modal {
  background: var(--bg-secondary);
  border-radius: var(--radius-lg); border: 1px solid var(--border);
  width: 90%; max-width: 480px; max-height: 90vh; overflow-y: auto;
}

.modal-header { padding: 20px 24px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
.modal-title { font-size: 18px; font-weight: 600; }
.modal-close { background: none; border: none; color: var(--text-secondary); cursor: pointer; font-size: 24px; }
.modal-close:hover { color: var(--text-primary); }

.modal-body { padding: 24px; }
.form-group { margin-bottom: 16px; }
.form-label { display: block; font-size: 13px; font-weight: 500; color: var(--text-secondary); margin-bottom: 6px; }

.form-input, .form-select, .form-textarea {
  width: 100%; padding: 10px 14px;
  background: var(--bg-tertiary); border: 1px solid var(--border);
  border-radius: var(--radius-sm); color: var(--text-primary);
  font-size: 14px; font-family: inherit;
}

.form-input:focus, .form-select:focus, .form-textarea:focus { outline: none; border-color: var(--accent); }
.form-textarea { min-height: 80px; resize: vertical; }

.modal-footer { padding: 16px 24px; border-top: 1px solid var(--border); display: flex; gap: 12px; justify-content: flex-end; }

.btn { padding: 10px 20px; border: none; border-radius: var(--radius-sm); cursor: pointer; font-size: 14px; font-weight: 500; transition: all var(--transition); }
.btn-primary { background: linear-gradient(135deg, #25D366, #128C7E); color: white; }
.btn-primary:hover { background: linear-gradient(135deg, #1ea852, #0d6e5e); }
.btn-secondary { background: var(--bg-tertiary); color: var(--text-secondary); }
.btn-secondary:hover { background: var(--border); color: var(--text-primary); }
.btn-danger { background: var(--danger); color: white; }
.btn-danger:hover { background: var(--danger-hover); }

.hidden { display: none !important; }
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    </style>
</head>

    <script>
        const defaultMessage = `Oi, tudo bem?

Me chamo Samuel, trabalho com audiovisual desde 2015 e ajudo marcas e agências a terem vídeos de qualidade com agilidade na entrega. Atendo clientes de Bauru até Ubatuba.

Já participei de projetos como gravações dos cursos da Giovanna Antonelli, vídeos para o Ibis Hotel, trabalhos para o Sicredi, produções para a academia X Prime e gravação de clipes para alguns players do audiovisual.

Busco me conectar com agências que queiram um parceiro de confiança em vídeo para somar nos projetos e facilitar o dia a dia do time.

Poderíamos ter uma conversa rápida sobre possíveis parcerias em audiovisual? Podemos alinhar por aqui mesmo ou marcar uma call.`;

        let contacts = JSON.parse(localStorage.getItem('crm_contacts')) || [];

        function migrateContacts() {
            let changed = false;
            contacts.forEach(contact => {
                if (contact.status === 'lead') {
                    if (contact.sent === true) {
                        contact.status = 'contacted';
                    } else {
                        contact.status = 'new';
                    }
                    changed = true;
                } else if (contact.sent === true && (!contact.status || contact.status === 'new')) {
                    contact.status = 'contacted';
                    changed = true;
                } else if (!contact.status || contact.status === 'new') {
                    contact.status = 'new';
                    changed = true;
                }
                delete contact.sent;
            });
            if (changed) {
                saveData();
            }
        }
        migrateContacts();

        function saveData() {
            localStorage.setItem('crm_contacts', JSON.stringify(contacts));
        }

        function switchView(view) {
            document.querySelectorAll('.nav-item').forEach(btn => btn.classList.remove('active'));
            event.target.closest('.nav-item').classList.add('active');

            if (view === 'contacts') {
                document.getElementById('contacts-view').classList.remove('hidden');
                document.getElementById('dashboard-view').classList.add('hidden');
                renderContacts();
            } else {
                document.getElementById('contacts-view').classList.add('hidden');
                document.getElementById('dashboard-view').classList.remove('hidden');
                renderDashboard();
            }
        }

        function renderStats() {
            const total = contacts.length;
            const newCount = contacts.filter(c => !c.status || c.status === 'new').length;
            const contacted = contacts.filter(c => c.status === 'contacted').length;
            const replied = contacts.filter(c => c.status === 'replied').length;

            document.getElementById('stat-total').textContent = total;
            document.getElementById('stat-new').textContent = newCount;
            document.getElementById('stat-contacted').textContent = contacted;
            document.getElementById('stat-replied').textContent = replied;

            document.getElementById('dash-total').textContent = total;
            document.getElementById('dash-new').textContent = newCount;
            document.getElementById('dash-contacted').textContent = contacted;
            document.getElementById('dash-replied').textContent = replied;
        }

        const columns = [
            { id: 'new', title: 'Novos Contatos', class: 'column-new' },
            { id: 'contacted', title: 'Contatados', class: 'column-contacted' },
            { id: 'replied', title: 'Respondidos', class: 'column-replied' }
        ];

        function renderContacts() {
            const board = document.getElementById('pipeline-board');
            const searchTerm = document.getElementById('search-input')?.value?.toLowerCase() || '';
            
            const filtered = contacts.filter(c =>
                !searchTerm ||
                (c.name || '').toLowerCase().includes(searchTerm) ||
                (c.phone || '').includes(searchTerm) ||
                (c.company || '').toLowerCase().includes(searchTerm)
            );

            board.innerHTML = columns.map(col => {
                const colContacts = filtered.filter(c => c.status === col.id || (!c.status && col.id === 'new'));
                return `
                    <div class="pipeline-column ${col.class}">
                        <div class="pipeline-column-header">
                            <div class="column-header-left">
                                <span class="column-title">${col.title}</span>
                                <span class="column-count">${colContacts.length}</span>
                            </div>
                        </div>
                        <div class="pipeline-column-body" ondragover="allowDrop(event)" ondrop="drop(event, '${col.id}')">
                            ${colContacts.length === 0 ? '<div class="column-empty">Nenhum contato</div>' : ''}
                            ${colContacts.map(contact => renderContactCard(contact)).join('')}
                        </div>
                    </div>
                `;
            }).join('');
        }

        function renderContactCard(contact) {
            const phoneFormatted = contact.phone ? contact.phone.replace(/(\d{2})(\d{5})(\d{4})/, '($1) $2-$3') : '';
            const msg = encodeURIComponent(contact.message || defaultMessage);
            const status = contact.status || 'new';
            const statusLabels = { new: 'Novo', contacted: 'Contatado', replied: 'Respondido' };
            
            return `
                <div class="lead-card ${status}" draggable="true" ondragstart="drag(event, '${contact.id}')">
                    <div class="lead-card-header">
                        <span class="lead-card-name">${(contact.name || 'Sem nome').substring(0, 25)}${(contact.name || '').length > 25 ? '...' : ''}</span>
                        <button class="lead-card-delete" onclick="deleteContactById('${contact.id}')" title="Excluir">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                        </button>
                    </div>
                    <div class="lead-card-info">
                        ${contact.phone ? `<div class="lead-card-detail">📱 ${phoneFormatted}</div>` : ''}
                        ${contact.email ? `<div class="lead-card-detail">✉️ ${contact.email}</div>` : ''}
                        ${contact.company ? `<div class="lead-card-detail">🏢 ${contact.company}</div>` : ''}
                    </div>
                    <span class="lead-card-status ${status}">${statusLabels[status]}</span>
                    <a href="https://wa.me/${contact.phone}?text=${msg}" target="_blank" class="lead-card-whatsapp">
                        💬 Enviar WhatsApp
                    </a>
                    <div class="lead-card-actions">
                        <button onclick="changeStatus('${contact.id}')">➡️ Mover</button>
                        <button onclick="editContact('${contact.id}')">✏️ Editar</button>
                    </div>
                </div>
            `;
        }

        function renderDashboard() {
            const board = document.getElementById('dashboard-board');
            const searchTerm = document.getElementById('search-input')?.value?.toLowerCase() || '';
            
            const filtered = contacts.filter(c =>
                !searchTerm ||
                (c.name || '').toLowerCase().includes(searchTerm) ||
                (c.phone || '').includes(searchTerm) ||
                (c.company || '').toLowerCase().includes(searchTerm)
            );

            renderStats();

            board.innerHTML = columns.map(col => {
                const colContacts = filtered.filter(c => c.status === col.id || (!c.status && col.id === 'new'));
                return `
                    <div class="pipeline-column ${col.class}">
                        <div class="pipeline-column-header">
                            <div class="column-header-left">
                                <span class="column-title">${col.title}</span>
                                <span class="column-count">${colContacts.length}</span>
                            </div>
                        </div>
                        <div class="pipeline-column-body" ondragover="allowDrop(event)" ondrop="drop(event, '${col.id}')">
                            ${colContacts.length === 0 ? '<div class="column-empty">Nenhum contato</div>' : ''}
                            ${colContacts.map(contact => renderContactCard(contact)).join('')}
                        </div>
                    </div>
                `;
            }).join('');
        }

        function filterContacts() {
            renderContacts();
        }

        function openModal(contactId = null) {
            document.getElementById('modal-overlay').classList.remove('hidden');
            document.getElementById('modal-title').textContent = contactId ? 'Editar Contato' : 'Novo Contato';
            document.getElementById('delete-btn').style.display = contactId ? 'block' : 'none';

            if (contactId) {
                const contact = contacts.find(c => c.id === contactId);
                document.getElementById('contact-id').value = contact.id;
                document.getElementById('contact-name').value = contact.name || '';
                document.getElementById('contact-phone').value = contact.phone || '';
                document.getElementById('contact-email').value = contact.email || '';
                document.getElementById('contact-company').value = contact.company || '';
                document.getElementById('contact-status').value = contact.status || 'new';
                document.getElementById('contact-notes').value = contact.notes || '';
            } else {
                document.getElementById('contact-form').reset();
                document.getElementById('contact-id').value = '';
            }
        }

        function closeModal() {
            document.getElementById('modal-overlay').classList.add('hidden');
        }

        function closeModalOutside(event) {
            if (event.target === document.getElementById('modal-overlay')) {
                closeModal();
            }
        }

        function saveContact(e) {
            e.preventDefault();
            const id = document.getElementById('contact-id').value || Date.now().toString();
            const existingContact = contacts.find(c => c.id === id);

            const contact = {
                id,
                name: document.getElementById('contact-name').value,
                phone: document.getElementById('contact-phone').value.replace(/\D/g, ''),
                email: document.getElementById('contact-email').value,
                company: document.getElementById('contact-company').value,
                status: document.getElementById('contact-status').value === 'customer' ? 'replied' : (existingContact?.status || 'new'),
                notes: document.getElementById('contact-notes').value,
                message: existingContact?.message || '',
                createdAt: existingContact?.createdAt || new Date().toISOString()
            };

            if (existingContact) {
                const index = contacts.findIndex(c => c.id === id);
                contacts[index] = contact;
            } else {
                contact.status = 'new';
                contacts.push(contact);
            }

            saveData();
            closeModal();
            renderContacts();
            renderStats();
        }

        function editContact(id) {
            openModal(id);
        }

        function deleteContact() {
            const id = document.getElementById('contact-id').value;
            if (id && confirm('Tem certeza que deseja excluir este contato?')) {
                contacts = contacts.filter(c => c.id !== id);
                saveData();
                closeModal();
                renderContacts();
                renderStats();
            }
        }

        function deleteContactById(id) {
            if (confirm('Tem certeza que deseja excluir este contato?')) {
                contacts = contacts.filter(c => c.id !== id);
                saveData();
                renderContacts();
                renderStats();
            }
        }

        function changeStatus(id) {
            const contact = contacts.find(c => c.id === id);
            if (!contact) return;
            
            const currentStatus = contact.status || 'new';
            const statusOrder = ['new', 'contacted', 'replied'];
            const currentIndex = statusOrder.indexOf(currentStatus);
            const nextStatus = statusOrder[(currentIndex + 1) % statusOrder.length];
            
            contact.status = nextStatus;
            saveData();
            renderContacts();
            renderStats();
        }

        function allowDrop(ev) {
            ev.preventDefault();
        }

        function drag(ev, id) {
            ev.dataTransfer.setData("text", id);
        }

        function drop(ev, newStatus) {
            ev.preventDefault();
            const id = ev.dataTransfer.getData("text");
            const contact = contacts.find(c => c.id === id);
            if (contact) {
                contact.status = newStatus;
                saveData();
                renderContacts();
                renderStats();
            }
        }

        function importXLSX(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, {type: 'array'});
                    const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
                    const jsonData = XLSX.utils.sheet_to_json(firstSheet, {header: 1});

                    if (!jsonData || jsonData.length < 2) {
                        alert('Arquivo vazio ou sem dados!');
                        return;
                    }

                    const nameIdx = 0;
                    const phoneIdx = 10;

                    let imported = 0;
                    for (let i = 1; i < jsonData.length; i++) {
                        const row = jsonData[i];
                        let name = row[nameIdx];
                        let phone = row[phoneIdx];

                        if (name && name.includes('google.com/maps')) {
                            const match = name.match(/\/place\/([^\/]+)\//);
                            if (match) {
                                name = decodeURIComponent(match[1].replace(/\+/g, ' '));
                            }
                        }

                        if (name || phone) {
                            contacts.push({
                                id: Date.now().toString() + i,
                                name: name || 'Sem nome',
                                phone: String(phone || '').replace(/\D/g, ''),
                                email: '',
                                company: '',
                                status: 'new',
                                notes: '',
                                message: '',
                                createdAt: new Date().toISOString()
                            });
                            imported++;
                        }
                    }

                    saveData();
                    renderContacts();
                    renderStats();
                    alert(`Importados ${imported} contatos com sucesso!`);
                } catch (err) {
                    alert('Erro ao importar: ' + err.message);
                }
            };
            reader.readAsArrayBuffer(file);
            event.target.value = '';
        }

        // Inicialização
        renderContacts();
        renderStats();
    </script>
</body>
</html>
